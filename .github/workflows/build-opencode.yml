name: Build OpenCode Plugin

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'agents/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsup.config.ts'
  pull_request:
    paths:
      - 'src/**'
      - 'agents/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsup.config.ts'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Verify agent prompts are embedded
        run: |
          for agent in "Rubber Duck" "senior software architect" "senior Spring Boot developer" "senior code reviewer"; do
            if ! grep -q "$agent" dist/index.js; then
              echo "ERROR: Agent prompt not found in bundle: $agent"
              exit 1
            fi
          done
          echo "All agent prompts embedded in dist/index.js"

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
