name: Build OpenCode Plugin

on:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - 'src/**'
      - 'agents/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsup.config.ts'
  pull_request:
    paths:
      - 'src/**'
      - 'agents/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsup.config.ts'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Verify agent prompts are embedded
        run: |
          for agent in "Rubber Duck" "senior software architect" "senior Spring Boot developer" "senior code reviewer"; do
            if ! grep -q "$agent" dist/index.js; then
              echo "ERROR: Agent prompt not found in bundle: $agent"
              exit 1
            fi
          done
          echo "All agent prompts embedded in dist/index.js"

  publish:
    needs: build
    name: Publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build

      - run: npm publish --provenance --access public
