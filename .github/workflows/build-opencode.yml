name: Build OpenCode Plugin

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'agents/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsup.config.ts'
  pull_request:
    paths:
      - 'src/**'
      - 'agents/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsup.config.ts'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Verify agent prompts are embedded
        run: |
          count=0
          for agent_file in agents/*.agent.md; do
            agent_name=$(grep -m1 '^name: ' "$agent_file" | sed 's/^name: //')
            if [ -z "$agent_name" ]; then
              echo "ERROR: Failed to extract agent name from $agent_file"
              exit 1
            fi
            if ! grep -Fq -- "$agent_name" dist/index.js; then
              echo "ERROR: Agent prompt not found in bundle: $agent_name (from $agent_file)"
              exit 1
            fi
            echo "OK: $agent_name"
            count=$((count + 1))
          done
          echo "All $count agent prompts verified in dist/index.js"

