name: Release Please

on:
  push:
    branches: [master]

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@11.12.1
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Verify agent prompts are embedded
        run: |
          count=0
          for agent_file in agents/*.agent.md; do
            agent_name=$(grep -m1 '^name: ' "$agent_file" | sed 's/^name: //')
            if [ -z "$agent_name" ]; then
              echo "ERROR: Failed to extract agent name from $agent_file"
              exit 1
            fi
            if ! grep -Fq -- "$agent_name" dist/index.js; then
              echo "ERROR: Agent prompt not found in bundle: $agent_name (from $agent_file)"
              exit 1
            fi
            echo "OK: $agent_name"
            count=$((count + 1))
          done
          echo "All $count agent prompts verified in dist/index.js"

      - run: npm publish --provenance --access public
